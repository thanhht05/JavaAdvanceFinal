<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cài đặt tài khoản | LuxStay</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />

    <style>
      body {
        background-color: #f0f2f5;
        font-family: "Inter", sans-serif;
      }

      /* Tối ưu hóa container chính khi không có sidebar */
      .profile-container {
        max-width: 850px;
        margin: 50px auto;
      }

      .account-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        border: none;
        margin-bottom: 30px;
      }

      .section-title {
        font-size: 1.2rem;
        font-weight: 800;
        color: #1a1a1a;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
      }

      .section-title i {
        width: 35px;
        height: 35px;
        background: #e7f1ff;
        color: #0d6efd;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 15px;
      }

      .form-label {
        font-weight: 700;
        color: #4a5568;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .form-control {
        padding: 12px 15px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background-color: #fcfcfc;
      }

      .form-control:focus {
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        border-color: #0d6efd;
      }

      .readonly-input {
        background-color: #f1f5f9 !important;
        color: #64748b;
        cursor: not-allowed;
      }

      .btn-save {
        padding: 15px 40px;
        border-radius: 12px;
        font-weight: 700;
        transition: all 0.3s ease;
      }

      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
      }
    </style>
  </head>
  <body>
    <!-- Header Fragment (Thay thế Sidebar) -->
    <div th:insert="~{layouts/user/header}"></div>

    <div class="container">
      <div class="profile-container">
        <div class="mb-4">
          <h2 class="fw-bold text-dark">Cài đặt tài khoản</h2>
          <p class="text-muted">
            Quản lý thông tin cá nhân và thiết lập bảo mật của bạn.
          </p>
        </div>

        <!-- Form duy nhất gửi lên Server -->
        <form
          th:action="@{/user/profile/update}"
          method="POST"
          id="profileForm"
        >
          <!-- PHẦN 1: THÔNG TIN CÁ NHÂN -->
          <div class="account-card">
            <div class="section-title">
              <i class="bi bi-person-fill"></i> Thông tin cá nhân
            </div>
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label">Họ và tên</label>
                <input
                  type="text"
                  name="fullName"
                  th:value="${user.fullName}"
                  class="form-control"
                  placeholder="Nhập họ tên của bạn"
                />
              </div>
              <div class="col-md-6">
                <label class="form-label">Số điện thoại</label>
                <input
                  type="tel"
                  name="phone"
                  th:value="${user.phone}"
                  class="form-control"
                  placeholder="Nhập số điện thoại"
                />
              </div>
              <div class="col-md-12">
                <label class="form-label">Email đăng nhập</label>
                <input
                  type="email"
                  th:value="${user.email}"
                  class="form-control readonly-input"
                  readonly
                />
                <div class="form-text mt-2">
                  <i class="bi bi-info-circle me-1"></i> Email dùng để đăng nhập
                  và không thể thay đổi.
                </div>
              </div>
            </div>
          </div>

          <!-- PHẦN 2: BẢO MẬT & MẬT KHẨU -->
          <div class="account-card">
            <div class="section-title">
              <i
                class="bi bi-shield-lock-fill"
                style="background: #fff4e5; color: #ff9800"
              ></i>
              Bảo mật & Mật khẩu
            </div>

            <div class="row g-4">
              <div class="col-md-12">
                <label class="form-label">Mật khẩu hiện tại</label>
                <input
                  type="password"
                  name="currentPassword"
                  class="form-control"
                  placeholder="Xác nhận mật khẩu cũ để đổi mật khẩu mới"
                />
              </div>
              <div class="col-md-6">
                <label class="form-label">Mật khẩu mới</label>
                <input
                  type="password"
                  name="newPassword"
                  id="newPassword"
                  class="form-control"
                  placeholder="Tối thiểu 6 ký tự"
                />
              </div>
              <div class="col-md-6">
                <label class="form-label">Xác nhận mật khẩu mới</label>
                <input
                  type="password"
                  name="confirmPassword"
                  id="confirmPassword"
                  class="form-control"
                  placeholder="Nhập lại mật khẩu mới"
                />
              </div>
            </div>

            <div
              class="mt-4 p-3 rounded-3 bg-light border-start border-4 border-warning"
            >
              <small class="text-muted">
                <i class="bi bi-lightbulb me-1"></i>
                <strong>Lưu ý:</strong> Để trống các ô mật khẩu nếu bạn chỉ muốn
                cập nhật thông tin cá nhân.
              </small>
            </div>
          </div>

          <!-- NÚT HÀNH ĐỘNG -->
          <div class="d-flex justify-content-between align-items-center mb-5">
            <a href="/" class="text-decoration-none text-secondary fw-bold"
              ><i class="bi bi-chevron-left"></i> Quay lại trang chủ</a
            >
            <button type="submit" class="btn btn-primary btn-save shadow">
              <i class="bi bi-check2-circle me-2"></i> LƯU TẤT CẢ THAY ĐỔI
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.getElementById("profileForm").onsubmit = function (e) {
        const newPass = document.getElementById("newPassword").value;
        const confirmPass = document.getElementById("confirmPassword").value;
        const currentPass =
          document.getElementsByName("currentPassword")[0].value;

        // Nếu có nhập mật khẩu mới
        if (newPass !== "" || confirmPass !== "") {
          if (currentPass === "") {
            e.preventDefault();
            alert("Vui lòng nhập mật khẩu hiện tại để thực hiện đổi mật khẩu!");
          } else if (newPass !== confirmPass) {
            e.preventDefault();
            alert("Mật khẩu mới và xác nhận mật khẩu không khớp!");
          } else if (newPass.length < 6) {
            e.preventDefault();
            alert("Mật khẩu mới phải có ít nhất 6 ký tự!");
          }
        }
      };
    </script>
  </body>
</html>
