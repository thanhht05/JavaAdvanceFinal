<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý dịch vụ</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Quản lý dịch vụ</h2>

        <a th:href="@{/admin/services/create}" class="btn btn-primary">
          + Thêm dịch vụ
        </a>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body">
          <table class="table table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Tên dịch vụ</th>
                <th>Đơn vị</th>
                <th>Giá</th>
                <th>Trạng thái</th>
                <th width="120">Hành động</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="service : ${services}">
                <td th:text="${service.id}">1</td>

                <td th:text="${service.serviceName}">Coca Cola</td>

                <td th:text="${service.unit}">Lon</td>

                <td
                  th:text="${#numbers.formatDecimal(service.defaultPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"
                >
                  20,000đ
                </td>

                <td>
                  <span th:if="${service.active}" class="badge bg-success">
                    Hoạt động
                  </span>

                  <span th:unless="${service.active}" class="badge bg-danger">
                    Đã khóa
                  </span>
                </td>

                <td>
                  <a
                    th:href="@{/admin/services/delete/{id}(id=${service.id})}"
                    class="btn btn-danger btn-sm"
                    onclick="return confirm('Bạn có chắc muốn xóa?');"
                  >
                    Xóa
                  </a>
                </td>
              </tr>

              <tr th:if="${#lists.isEmpty(services)}">
                <td colspan="6" class="text-center text-muted py-4">
                  Chưa có dịch vụ nào
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
