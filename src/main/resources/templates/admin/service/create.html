<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Thêm dịch vụ</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
              <h2 class="fw-bold mb-4 text-center">Thêm dịch vụ</h2>

              <form
                th:action="@{/admin/services/create}"
                method="post"
                th:object="${newService}"
              >
                <!-- SERVICE NAME -->
                <div class="mb-3">
                  <label class="form-label fw-semibold"> Tên dịch vụ </label>

                  <input
                    type="text"
                    class="form-control"
                    th:field="*{serviceName}"
                    placeholder="Ví dụ: Coca Cola"
                    required
                  />
                </div>

                <!-- UNIT -->
                <div class="mb-3">
                  <label class="form-label fw-semibold"> Đơn vị </label>

                  <input
                    type="text"
                    class="form-control"
                    th:field="*{unit}"
                    placeholder="Ví dụ: Lon, Chai, Kg..."
                    required
                  />
                </div>

                <!-- PRICE -->
                <div class="mb-3">
                  <label class="form-label fw-semibold"> Giá dịch vụ </label>

                  <input
                    type="number"
                    class="form-control"
                    th:field="*{defaultPrice}"
                    placeholder="Nhập giá"
                    min="0"
                    required
                  />
                </div>

                <!-- DESCRIPTION -->
                <div class="mb-4">
                  <label class="form-label fw-semibold"> Mô tả </label>

                  <textarea
                    class="form-control"
                    rows="4"
                    th:field="*{description}"
                    placeholder="Mô tả dịch vụ"
                  >
                  </textarea>
                </div>

                <!-- BUTTON -->
                <div class="d-flex justify-content-between">
                  <a
                    th:href="@{/admin/services}"
                    class="btn btn-secondary px-4"
                  >
                    Quay lại
                  </a>

                  <button type="submit" class="btn btn-primary px-4">
                    Lưu dịch vụ
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
