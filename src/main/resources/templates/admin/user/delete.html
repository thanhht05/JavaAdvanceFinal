<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Xác nhận xóa User</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/css/style-admin.css" />

    <style>
      body {
        background-color: #f4f7f6;
        min-height: 100vh;
        display: flex;
        margin: 0;
      }

      /* Main Content */
      .main-content {
        flex-grow: 1;
        padding: 40px;
      }

      /* Delete Confirmation Card */
      .delete-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        border: none;
        max-width: 800px;
        margin: 0 auto;
      }

      .user-summary {
        display: flex;
        gap: 25px;
        align-items: center;
        background: #fafafa;
        border-radius: 12px;
        padding: 25px;
      }

      .avatar-placeholder {
        width: 100px;
        height: 100px;
        background-color: #e9ecef;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: #adb5bd;
      }

      .btn-confirm-delete {
        background-color: #ff4d4f;
        border: none;
        color: white;
        padding: 12px 30px;
        font-weight: 700;
        border-radius: 10px;
        transition: 0.3s;
      }
      .btn-confirm-delete:hover {
        background-color: #cf1322;
        transform: scale(1.02);
      }
    </style>
  </head>
  <body>
    <div th:insert="~{layouts/admin/sidebar}"></div>

    <div class="main-content">
      <div class="container-fluid">
        <nav aria-label="breadcrumb" class="mb-4">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a th:href="@{/admin/users}">Quản lý User</a>
            </li>
            <li class="breadcrumb-item active">Xác nhận xóa</li>
          </ol>
        </nav>

        <div class="delete-card">
          <div class="p-4 p-md-5">
            <h5 class="mb-4 fw-bold">Thông tin User sắp xóa:</h5>

            <div class="user-summary mb-5 shadow-sm">
              <div class="avatar-placeholder">
                <i class="bi bi-person-fill"></i>
              </div>

              <div>
                <h4 class="fw-bold mb-2 text-dark" th:text="${user.fullName}">
                  Nguyễn Văn A
                </h4>
                <p class="text-muted mb-1">
                  <i class="bi bi-envelope me-2"></i>Email:
                  <span th:text="${user.email}" class="text-dark"></span>
                </p>
                <p class="text-muted mb-1">
                  <i class="bi bi-telephone me-2"></i>SĐT:
                  <span th:text="${user.phone}" class="text-dark"></span>
                </p>
                <p class="text-muted mb-0">
                  <i class="bi bi-geo-alt me-2"></i>Địa chỉ:
                  <span th:text="${user.address}" class="text-dark"></span>
                </p>
              </div>
            </div>

            <form
              method="post"
              th:action="@{/admin/users/delete/{id}(id=${user.id})}"
            >
              <div class="d-flex justify-content-center gap-3">
                <a
                  th:href="@{/admin/users}"
                  class="btn btn-light px-5 py-2 fw-bold border"
                >
                  <i class="bi bi-arrow-left me-2"></i>Hủy, quay lại
                </a>
                <button
                  type="submit"
                  class="btn btn-confirm-delete px-5 py-2 shadow"
                >
                  <i class="bi bi-trash3-fill me-2"></i>
                  Đồng ý xóa vĩnh viễn
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
